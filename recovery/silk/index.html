<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Silk Background</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #9c9d9e; }
      body::before,
      body::after {
        content: "";
        position: absolute;
        inset: -35%;
        background:
          radial-gradient(ellipse at 22% 48%, rgba(255,255,255,.13), transparent 40%),
          radial-gradient(ellipse at 78% 55%, rgba(18,18,18,.08), transparent 44%),
          linear-gradient(118deg, transparent 24%, rgba(255,255,255,.08) 45%, transparent 66%);
        filter: blur(26px);
        animation: drift 16s ease-in-out infinite alternate;
      }
      body::after { transform: rotate(180deg); opacity: .55; animation-duration: 22s; }
      @keyframes drift {
        from { translate: -2% -1%; scale: 1.02; }
        to { translate: 3% 2%; scale: 1.08; }
      }
      @media (prefers-reduced-motion: reduce) {
        body::before, body::after { animation: none; }
      }
    </style>
  </head>
  <body aria-hidden="true"></body>
</html>
