<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabanan, Bali</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      body {
        display: grid;
        place-items: end center;
        padding: 0 20px 32px;
        background:
          radial-gradient(circle at 58% 42%, rgba(255,255,255,.025), transparent 34%),
          #292929;
        color: #fff;
        font: 500 14px/1.2 Arial, Helvetica, sans-serif;
      }
      .location {
        min-width: 112px;
        padding: 9px 18px;
        border: 0;
        border-radius: 999px;
        background: #5e5e5c;
        box-shadow: 0 2px 8px rgba(0,0,0,.16);
        color: inherit;
        text-align: center;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <a class="location" href="https://maps.google.com/?q=Tabanan%2C+Bali" target="_blank" rel="noopener">Tabanan, Bali</a>
  </body>
</html>
